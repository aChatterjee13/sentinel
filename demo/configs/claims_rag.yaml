version: "1.0"

# ─────────────────────────────────────────────────────────────────────
# DEMO CONFIG — Insurance carrier, claims RAG application
# Playbook B: The insurance modernizer
#
# Talking points for this config:
#   - PII redaction BEFORE the LLM call (insurance compliance gold)
#   - Groundedness check on every output (hallucination defence)
#   - Token budget enforcement per query and per day
#   - Same audit trail as the carrier's tabular fraud models
# ─────────────────────────────────────────────────────────────────────

model:
  name: claims_qa_rag
  type: generation
  domain: tabular  # base SDK domain — LLMOps owns the LLM-specific bits
  description: "RAG pipeline for answering customer claims questions"

drift:
  data:
    method: psi
    threshold: 0.2

llmops:
  enabled: true
  mode: rag

  prompts:
    registry_backend: local
    versioning: semantic
    ab_testing:
      enabled: true
      default_split: [90, 10]

  guardrails:
    input:
      - type: pii_detection
        action: redact
        entities: [person, ssn, account_number, email, phone, policy_number]
        redaction_strategy: mask
      - type: jailbreak_detection
        method: embedding_similarity
        threshold: 0.85
        action: block
      - type: topic_fence
        allowed_topics: [insurance_claims, policy_coverage, premiums, billing]
        action: warn
      - type: token_budget
        max_input_tokens: 4000
        action: block
    output:
      - type: toxicity
        threshold: 0.7
        action: block
      - type: groundedness
        method: nli
        min_score: 0.65
        action: warn
      - type: regulatory_language
        prohibited_phrases_file: compliance/prohibited_terms.yaml
        action: block

  quality:
    evaluator:
      method: llm_judge
      judge_model: gpt-4o-mini
      rubrics:
        relevance: {weight: 0.3, scale: 5}
        completeness: {weight: 0.3, scale: 5}
        clarity: {weight: 0.2, scale: 5}
        safety: {weight: 0.2, scale: 5}
      sample_rate: 0.1
    semantic_drift:
      embedding_model: text-embedding-3-small
      window: 7d
      threshold: 0.15
    retrieval_quality:
      track: [relevance, chunk_utilisation, faithfulness, answer_coverage]
      min_relevance: 0.55
      min_faithfulness: 0.7

  token_economics:
    track_by: [model, prompt_version, user_segment, use_case]
    budgets:
      daily_max_cost: 500.00
      per_query_max_tokens: 8000
      per_query_max_cost: 0.50
    alerts:
      daily_cost_threshold: 400.00
      cost_per_query_trend_increase_pct: 20

  prompt_drift:
    detection_window: 7d
    signals:
      quality_score_decline: 0.10
      guardrail_violation_rate_increase: 0.05
      token_usage_increase_pct: 25

alerts:
  channels:
    - type: slack
      webhook_url: ${SLACK_WEBHOOK_URL}
      channel: "#claims-ai-alerts"
  policies:
    cooldown: 30m
    rate_limit_per_hour: 60

audit:
  storage: local
  path: ./demo/audit/insurer/
  retention_days: 2555
  log_predictions: true
  compliance_frameworks: [fca_consumer_duty, eu_ai_act, gdpr]
